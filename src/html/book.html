<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Library — Fetch Books</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://unpkg.com/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">

</head>

<body class="font-sans bg-[#fffaf0]> m-0 p-5">
    <header>
        <h1 class="text-center">Library — Book Browser</h1>
    </header>

    <main>
        <button id="loadBooksBtn"
            class="px-5 py-3 bg-[#f59e0b] text-white rounded-md cursor-pointer block mx-auto mt-5 text-base hover:bg-indigo-700">
            Load All Books
        </button>
        <div id="booksContainer" class="mt-5 max-w-[600px] mx-auto"></div>
    </main>
    <script src="js/loadBooksBtn.js"></script>
</body>

<footer class="bg-gray-100 p-8">
    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- LEFT LARGE COLUMN -->
            <div class="bg-white border p-6 h-30">
                <h3 class="text-xl font-semibold mb-4"><br></h3>
                <span class="text-lg text-body sm:text-center">© 2023 <a href="http://localhost:8081/books"
                        class="hover:underline">Libary System</a>. All Rights Reserved.
                </span>
            </div>

            <!-- RIGHT STACKED COLUMNS -->
            <div class="flex flex-col gap-4">

                <div class="bg-white border p-6 h-10">
                    <h4>
                        <a href="http://localhost:8081/About"
                            class="font-semibold hover:underline hover:text-blue-500 me-4 md:me-6">About</a>
                    </h4>
                </div>

                <div class="bg-white border p-6 h-10">
                    <h4>
                        <a href="http://localhost:8081/Licensing"
                            class="font-semibold hover:underline hover:text-blue-500 me-4 md:me-6">Licensing</a>
                    </h4>
                </div>

                <div class="bg-white border p-6 h-10">
                    <h4>
                        <a href="http://localhost:8081/Privacy-Policy"
                            class="font-semibold hover:underline hover:text-blue-500 me-4 md:me-6">Privacy Policy</a>
                    </h4>
                </div>

            </div>

        </div>
    </div>
</footer>



</html>
